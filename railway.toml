[build]
builder = "RAILPACK"
buildCommand = "pnpm install --frozen-lockfile && pnpm db:generate && pnpm --filter @ivaleter/web build"

[deploy]
startCommand = "node scripts/resolve-stuck-migrations.js && pnpm --filter @ivaleter/db migrate && cp -r apps/web/.next/static apps/web/.next/standalone/apps/web/.next/static && cp -r apps/web/public apps/web/.next/standalone/apps/web/public && HOSTNAME=0.0.0.0 node apps/web/.next/standalone/apps/web/server.js"
healthcheckPath = "/api/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
