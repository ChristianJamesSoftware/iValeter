[phases.setup]
nixPkgs = ["nodejs_20", "pnpm-9_x"]

[phases.install]
cmds = ["pnpm install --frozen-lockfile"]

[phases.build]
cmds = [
  "pnpm db:generate",
  "pnpm --filter @ivaleter/web build",
]

[start]
cmd = "node scripts/resolve-stuck-migrations.js && pnpm --filter @ivaleter/db migrate && cp -r apps/web/.next/static apps/web/.next/standalone/apps/web/.next/static && cp -r apps/web/public apps/web/.next/standalone/apps/web/public && HOSTNAME=0.0.0.0 node apps/web/.next/standalone/apps/web/server.js"
